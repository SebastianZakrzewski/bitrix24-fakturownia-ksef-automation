# Production compose for Hetzner. Copy to /opt/fakturownia-ksef-api/ with a local .env (chmod 600).
# Image is built and pushed by GitHub Actions to GHCR.
# Requires external network docker-caddy_default (Caddy reverse_proxy fakturownia-ksef-api:3004).

services:
  api:
    image: ghcr.io/sebastianzakrzewski/bitrix24-fakturownia-ksef-automation:latest
    container_name: fakturownia-ksef-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3004"
    ports:
      - "127.0.0.1:3004:3004"
    networks:
      - default
      - caddy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3004/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  default:
    name: fakturownia-ksef-api_default
  caddy:
    external: true
    name: docker-caddy_default
